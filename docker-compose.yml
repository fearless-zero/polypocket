version: '3.9'

services:
  bot:
    image: ghcr.io/${GITHUB_REPOSITORY:-user/polypocket}:latest
    pull_policy: always
    container_name: polypocket
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - POLYMARKET_API_KEY=${POLYMARKET_API_KEY}
      - POLYMARKET_API_SECRET=${POLYMARKET_API_SECRET}
      - POLYMARKET_API_PASSPHRASE=${POLYMARKET_API_PASSPHRASE}
      - CHAINLINK_RPC=${CHAINLINK_RPC:-https://polygon-rpc.com}
      - BANKROLL=${BANKROLL:-2000}
      - PROFIT_TARGET=${PROFIT_TARGET:-0.75}
      - STOP_LOSS=${STOP_LOSS:-0.35}
    volumes:
      - polypocket_logs:/app/logs
      - polypocket_data:/app/data
    command: ["--mode", "live", "--session", "overnight"]
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - polypocket-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Paper trading instance (no real orders)
  paper:
    image: ghcr.io/${GITHUB_REPOSITORY:-user/polypocket}:latest
    pull_policy: always
    container_name: polypocket-paper
    restart: "no"
    environment:
      - PYTHONUNBUFFERED=1
      - POLYMARKET_API_KEY=${POLYMARKET_API_KEY}
      - POLYMARKET_API_SECRET=${POLYMARKET_API_SECRET}
      - POLYMARKET_API_PASSPHRASE=${POLYMARKET_API_PASSPHRASE}
      - CHAINLINK_RPC=${CHAINLINK_RPC:-https://polygon-rpc.com}
      - BANKROLL=${BANKROLL:-2000}
    volumes:
      - polypocket_logs:/app/logs
      - polypocket_data:/app/data
    command: ["--mode", "paper", "--session", "test"]
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - polypocket-network
    profiles:
      - paper
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  polypocket_logs:
    driver: local
  polypocket_data:
    driver: local

networks:
  polypocket-network:
    driver: bridge
