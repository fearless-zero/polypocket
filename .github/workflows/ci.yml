name: Build, Test & Deploy

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check src/ tests/ --select E,F,W --ignore E501

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock

      - name: Run tests
        env:
          POLYMARKET_API_KEY: test_key
          POLYMARKET_API_SECRET: test_secret
          POLYMARKET_API_PASSPHRASE: test_passphrase
          CHAINLINK_RPC: https://polygon-rpc.com
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  notify-deployment:
    name: Notify Deployment Ready
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Display deployment info
        run: |
          echo "✅ Image successfully pushed to GHCR"
          echo ""
          echo "Image: ${{ env.IMAGE_NAME }}:latest"
          echo "SHA:   ${{ github.sha }}"
          echo ""
          echo "To deploy on zelkova:"
          echo "  ssh zelkova"
          echo "  cd /path/to/polypocket"
          echo "  bash scripts/deploy-remote.sh"

      - name: Trigger remote deployment (webhook)
        if: vars.DEPLOYMENT_WEBHOOK_URL != ''
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOYMENT_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"action":"deploy","environment":"production","image":"${{ env.IMAGE_NAME }}:latest"}' \
            "${{ vars.DEPLOYMENT_WEBHOOK_URL }}"
        continue-on-error: true
